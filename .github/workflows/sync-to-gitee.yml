name: 每4小时同步GitHub私有仓库到Gitee
on:
  schedule:
    - cron: '0 */4 * * *'  # 每4小时执行一次（UTC时间）
  workflow_dispatch:  # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整提交历史
      
      - name: 配置Git用户信息
        run: |
          git config --global user.name "Auto Sync"
          git config --global user.email "auto@github.com"
      
      - name: 同步到Gitee私有仓库
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          # 仅修改下面2行：你的Gitee用户名、仓库名
          GITEE_USER="你的Gitee用户名"
          GITEE_REPO="你的仓库名"
          
          # 原生Git命令推送，兼容所有环境，不依赖第三方废弃Action
          git remote add gitee https://${GITEE_TOKEN}@gitee.com/${GITEE_USER}/${GITEE_REPO}.git
          git push --force --all gitee
