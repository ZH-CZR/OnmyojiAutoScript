name: 每4小时同步GitHub私有仓库到Gitee私有仓库
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取全部代码与提交历史
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置Git信息
        run: |
          git config --global user.name "Auto Sync"
          git config --global user.email "auto-sync@github.com"

      - name: 同步到Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          GITEE_USER="czrgitee"
          GITEE_REPO="OAS"
          git remote add gitee https://${GITEE_TOKEN}@gitee.com/${GITEE_USER}/${GITEE_REPO}.git
          git push --force --all gitee
